<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Animate AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- CSS local -->
     <link rel="stylesheet" href="style.css">

    <title>Consulta CEP</title>
</head>

<body >

    <h1 data-aos="fade-up" >Consulta CEP</h1>
    <p data-aos="fade-up" data-aos-duration="1200" >Digite o CEP desejado para buscar as informações do local. Evite usar traços e pontos ou qualquer caracter especial.</p>

    <div class="busca" data-aos="zoom-in" data-aos-duration="1500">
        <label for="cep" data-aos="zoom-in" data-aos-duration="2000"></label>CEP</label>
        <input type="text" class="cep-input" id="cep" data-aos="zoom-in" data-aos-duration="1500">
        <button class="cep-button" >Buscar</button>
    </div>

    <div class="resultado" ></div>


    <!-- script do AOS animate -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Inicialização do AOS animate -->
    <script>
        AOS.init();
    </script>
    <!-- Sweet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- script local -->
    <script src="index.js"></script>
</body>

</html>
